AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Event Calendar Scraper — application stack.

Parameters:
  DeployBucket:
    Type: String
    Description: S3 bucket where the Lambda zip was uploaded (created by bootstrap stack).

  PlaywrightLayerArn:
    Type: String
    Description: >
      ARN of the Lambda Layer containing the Chromium binary for Playwright.
      Use sparticuz/chromium — upload the layer zip from
      https://github.com/Sparticuz/chromium/releases and note the ARN.

  NotifyEmail:
    Type: String
    Default: "max@kineticevents.com,dylanclark2396@gmail.com"
    Description: Comma-separated recipient email addresses for new-event notifications.

  FromEmail:
    Type: String
    Description: >
      Sender email address for SES. Must be verified in SES before use.
      Verify it with: aws ses verify-email-identity --email-address <address>

  ScheduleExpression:
    Type: String
    Default: "cron(0 1 * * ? *)"
    Description: >
      EventBridge schedule expression. Default is once per day.
      Use cron syntax for a specific time, e.g. "cron(0 9 * * ? *)" for 9 AM UTC daily.

Resources:

  # ------------------------------------------------------------------
  # S3 bucket — shared snapshot storage, one folder per calendar
  # ------------------------------------------------------------------
  SnapshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "event-calendar-scraper-snapshots-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90

  # ------------------------------------------------------------------
  # IAM role — worker Lambda (S3 snapshots only)
  # ------------------------------------------------------------------
  WorkerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: event-calendar-scraper-worker-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SnapshotBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !GetAtt SnapshotBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${SnapshotBucket.Arn}/*/events_snapshot.json"

  # ------------------------------------------------------------------
  # IAM role — orchestrator Lambda (SES + invoke worker)
  # ------------------------------------------------------------------
  OrchestratorExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: event-calendar-scraper-orchestrator-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrchestratorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt ScraperWorkerFunction.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource:
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/max@kineticevents.com"
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/dylanclark2396@gmail.com"
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${FromEmail}"

  # ------------------------------------------------------------------
  # Worker Lambda — runs a single scraper
  # ------------------------------------------------------------------
  ScraperWorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: event-calendar-scraper-worker
      Description: Runs one calendar scraper and stores its diff snapshot in S3.
      Runtime: python3.12
      Handler: lambda_function.worker_handler
      Role: !GetAtt WorkerExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: scraper.zip
      Timeout: 180
      MemorySize: 1024
      Layers:
        - !Ref PlaywrightLayerArn
      Environment:
        Variables:
          SNAPSHOT_BUCKET: !Ref SnapshotBucket

  # ------------------------------------------------------------------
  # Snapshot Diff Lambda — testing tool, diffs versioned S3 snapshots
  # ------------------------------------------------------------------
  SnapshotDiffFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: event-calendar-scraper-snapshot-diff
      Description: Diffs two versioned S3 snapshots for a given calendar_id.
      Runtime: python3.12
      Handler: snapshot_diff.handler
      Role: !GetAtt WorkerExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: scraper.zip
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SNAPSHOT_BUCKET: !Ref SnapshotBucket

  # ------------------------------------------------------------------
  # Orchestrator Lambda — fans out to workers, sends email
  # ------------------------------------------------------------------
  ScraperOrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: event-calendar-scraper-orchestrator
      Description: Fans out to per-scraper workers in parallel and sends a single notification email.
      Runtime: python3.12
      Handler: lambda_function.orchestrator_handler
      Role: !GetAtt OrchestratorExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: scraper.zip
      Timeout: 120
      MemorySize: 128
      Environment:
        Variables:
          SNAPSHOT_BUCKET: !Ref SnapshotBucket
          NOTIFY_EMAIL: !Ref NotifyEmail
          FROM_EMAIL: !Ref FromEmail
          WORKER_FUNCTION_NAME: !Ref ScraperWorkerFunction

  # ------------------------------------------------------------------
  # EventBridge rule — daily trigger (hits orchestrator)
  # ------------------------------------------------------------------
  DailySchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: event-calendar-scraper-daily
      Description: Triggers all calendar scrapers on a schedule.
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: OrchestratorTarget
          Arn: !GetAtt ScraperOrchestratorFunction.Arn

  ScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ScraperOrchestratorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailySchedule.Arn

Outputs:
  SnapshotBucketName:
    Description: S3 bucket where all calendar snapshots are stored
    Value: !Ref SnapshotBucket

  WorkerFunctionName:
    Description: Worker Lambda function name
    Value: !Ref ScraperWorkerFunction

  OrchestratorFunctionName:
    Description: Orchestrator Lambda function name
    Value: !Ref ScraperOrchestratorFunction

  OrchestratorFunctionArn:
    Description: Orchestrator Lambda function ARN
    Value: !GetAtt ScraperOrchestratorFunction.Arn
